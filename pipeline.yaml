apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: tax-pipeline
spec:
  tasks:
    - name: npm-install
      taskRef:
        name: npm-install

    - name: jasmine-test
      taskRef:
        name: jasmine-test
      runAfter:
        - npm-install

    - name: build
      taskRef:
        name: buildah
      runAfter:
        - jasmine-test
